packages:
  - 'apps/*'
  - 'libs/*'

# Enforce a 1-week delay (10080 minutes)
minimumReleaseAge: 10080

# Optional: Allow specific packages to update immediately
minimumReleaseAgeExclude:
  - react
  - next
  - typescript
  - '@types/*'
  - '@next/swc-linux-x64-gnu@15.5.18' # security patch
  - '@cowprotocol/*'
  - storybook
  - '@storybook/*'
