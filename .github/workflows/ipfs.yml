name: ipfs

on:
  push:
    tags: [ cowswap-v* ]

permissions:
  contents: read

jobs:
  queue-ipfs-deploy:
    name: Queue trusted IPFS deploy
    runs-on: ubuntu-latest

    steps:
      - name: Queue deploy on trusted workflow code
        run: echo "Queued trusted IPFS deploy for ${GITHUB_REF} (${GITHUB_SHA})."
