<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cow.fi Maintenance</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    .notice {
      max-width: 720px;
      padding: 32px;
      margin: 24px;
      border: 1px solid #333;
      border-radius: 12px;
      background: #1a1a1a;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 2rem;
      line-height: 1.2;
    }

    p {
      margin: 0;
      font-size: 1.125rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
<main class="notice">
  <h1>Maintenance</h1>
  <p>
    The cow.fi domain is currently under maintenance. We'll be back shortly.
  </p>
</main>
</body>
</html>
